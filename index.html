<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rutina Disciplina Extrema</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: black;
      color: white;
    }
  </style>
</head>

<body class="flex flex-col items-center p-4">

  <h1 class="text-2xl font-bold mb-2 text-center">
    🔥 MODO DISCIPLINA EXTREMA
  </h1>

  <p class="text-red-500 text-sm mb-4 text-center">
    SIN EXCUSAS. SIN NEGOCIAR. SOLO RESULTADOS.
  </p>

  <!-- PROGRESO -->
  <div class="w-full max-w-md mb-4">
    <div class="bg-gray-800 rounded-full h-4 overflow-hidden">
      <div id="progressBar" class="bg-green-500 h-4 w-0 transition-all"></div>
    </div>
    <p class="text-center text-sm mt-2" id="progressText">0%</p>
  </div>

  <!-- EJERCICIOS -->
  <div id="exerciseList" class="w-full max-w-md space-y-3"></div>

  <!-- BOTÓN RESET -->
  <button onclick="resetDay()" class="mt-6 bg-red-600 px-4 py-2 rounded-xl">
    Reiniciar día
  </button>

<script>
const exercises = [
  { name: "Sentadillas", reps: 20 },
  { name: "Flexiones", reps: 15 },
  { name: "Abdominales", reps: 25 },
  { name: "Plancha", reps: "30 seg" },
  { name: "Burpees", reps: 10 }
];

let progress = JSON.parse(localStorage.getItem("progress")) || [];

function render() {
  const container = document.getElementById("exerciseList");
  container.innerHTML = "";

  exercises.forEach((ex, i) => {
    const done = progress.includes(i);

    const div = document.createElement("div");
    div.className = `p-4 rounded-xl flex justify-between items-center ${
      done ? "bg-green-700" : "bg-gray-800"
    }`;

    div.innerHTML = `
      <div>
        <p class="font-bold">${ex.name}</p>
        <p class="text-sm">${ex.reps}</p>
      </div>
      <button onclick="toggle(${i})" class="bg-black px-3 py-1 rounded">
        ${done ? "✔" : "OK"}
      </button>
    `;

    container.appendChild(div);
  });

  updateProgress();
}

function toggle(i) {
  if (progress.includes(i)) {
    progress = progress.filter(x => x !== i);
  } else {
    progress.push(i);
  }
  localStorage.setItem("progress", JSON.stringify(progress));
  render();
}

function updateProgress() {
  const percent = Math.round((progress.length / exercises.length) * 100);
  document.getElementById("progressBar").style.width = percent + "%";
  document.getElementById("progressText").innerText = percent + "% completado";
}

function resetDay() {
  localStorage.removeItem("progress");
  progress = [];
  render();
}

render();
</script>

</body>
</html>
