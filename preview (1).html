<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISCIPLINA DIOS</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f14;color:white;}
.container{max-width:500px;margin:auto;padding:15px;}
h1{text-align:center;font-size:22px;}
.card{background:#121821;padding:15px;border-radius:12px;margin-bottom:12px;}
button{width:100%;padding:12px;margin-top:8px;border:none;border-radius:10px;background:#00c853;color:white;font-weight:bold;}
.timer{font-size:32px;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.day{height:30px;background:#1c2530;border-radius:5px;}
.done{background:#00c853;}
.fail{background:red;}
img{width:100%;border-radius:10px;margin-top:10px;}
.small{font-size:12px;color:#aaa;}
</style>
</head>

<body>

<div class="container">

<h1>🔥 DISCIPLINA MODO DIOS</h1>

<div class="card">
<h3 id="dayTitle"></h3>
<p id="weekInfo"></p>

<img id="exerciseImg">

<div class="timer" id="timer">30</div>

<button onclick="startTimer()">INICIAR</button>
<button onclick="completeDay()">CUMPLIDO</button>
<button onclick="failDay()">FALLÉ</button>

<p class="small">Si fallas → reinicio total</p>
</div>

<div class="card">
<h3>📊 Progreso</h3>
<div class="grid" id="tracker"></div>
</div>

<div class="card">
<h3>🍽️ Nutrición simple</h3>
<p>Proteína + vegetal + agua</p>
<p>Evita azúcar y ultra procesados</p>
<p>No negocies con tu disciplina</p>
</div>

</div>

<script>

// EJERCICIOS (reales)
const exercises = [
 {name:"Sentadillas", img:"https://images.unsplash.com/photo-1599058917212-d750089bc07e"},
 {name:"Plancha", img:"https://images.unsplash.com/photo-1583454110551-21f2fa2afe61"},
 {name:"Zancadas", img:"https://images.unsplash.com/photo-1594737625785-a6cbdabd333c"},
 {name:"Push Ups", img:"https://images.unsplash.com/photo-1598970434795-0c54fe7c0642"}
];

// FECHA BASE (ajústala si quieres)
const startDate = new Date("2026-04-01");
const today = new Date();
const diff = Math.floor((today - startDate)/(1000*60*60*24));

let week = Math.floor(diff/7)+1;
let day = (diff%7)+1;

// PROGRESIÓN
let reps = 10 + (week*2);

// UI
document.getElementById("dayTitle").innerText = "Día " + day;
document.getElementById("weekInfo").innerText = "Semana " + week + " | Reps: " + reps;

let exercise = exercises[(day-1)%exercises.length];
document.getElementById("exerciseImg").src = exercise.img;

// TIMER
let time = 30;
let interval;

function startTimer(){
 clearInterval(interval);
 interval = setInterval(()=>{
  time--;
  document.getElementById("timer").innerText = time;
  if(time<=0){
   clearInterval(interval);
   alert("SIGUE. SIN EXCUSAS.");
   time=30;
  }
 },1000);
}

// TRACKER
function renderTracker(){
 const tracker = document.getElementById("tracker");
 tracker.innerHTML="";
 for(let i=1;i<=30;i++){
  let d=document.createElement("div");
  d.classList.add("day");

  if(localStorage.getItem("day"+i)=="done") d.classList.add("done");
  if(localStorage.getItem("day"+i)=="fail") d.classList.add("fail");

  tracker.appendChild(d);
 }
}

// COMPLETAR
function completeDay(){
 localStorage.setItem("day"+day,"done");
 renderTracker();
}

// FALLAR
function failDay(){
 alert("REINICIO TOTAL. DISCIPLINA > EXCUSAS.");
 localStorage.clear();
 renderTracker();
}

renderTracker();

// ALARMA 6:30
setInterval(()=>{
 let now = new Date();
 if(now.getHours()==6 && now.getMinutes()==30){
  alert("ENTRENA. AHORA.");
 }
},60000);

</script>

</body>
</html>
