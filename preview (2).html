<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODO DIOS</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f14;color:white;}
.container{max-width:500px;margin:auto;padding:15px;}
.card{background:#121821;padding:15px;border-radius:12px;margin-bottom:12px;}
h1{text-align:center;}
button{width:100%;padding:12px;margin-top:8px;border:none;border-radius:10px;background:#00c853;color:white;font-weight:bold;}
.timer{text-align:center;font-size:28px;}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.day{height:35px;font-size:12px;display:flex;align-items:center;justify-content:center;background:#1c2530;border-radius:5px;}
.done{background:#00c853;}
img{width:100%;border-radius:10px;margin-top:10px;}
.water{display:flex;flex-wrap:wrap;gap:5px;}
.glass{width:30px;height:30px;border-radius:5px;background:#1c2530;}
.full{background:#00b0ff;}
</style>
</head>

<body>

<div class="container">

<h1>🔥 DISCIPLINA MODO DIOS</h1>

<div class="card">
<h3 id="dayTitle"></h3>
<h2 id="exerciseName"></h2>

<img id="exerciseImg">

<div class="timer" id="timer">30</div>

<button onclick="startTimer()">INICIAR</button>
<button onclick="completeDay()">CUMPLIDO</button>
<button onclick="failAll()">FALLÉ</button>
</div>

<div class="card">
<h3>📊 Progreso</h3>
<div class="grid" id="tracker"></div>
</div>

<div class="card">
<h3>💧 Agua (8 vasos)</h3>
<div class="water" id="waterTracker"></div>
<button onclick="addWater()">+1 vaso</button>
</div>

</div>

<script>

// EJERCICIOS CORRECTOS
const exercises = [
 {name:"Sentadillas", img:"https://images.unsplash.com/photo-1599058917212-d750089bc07e"},
 {name:"Plancha", img:"https://images.unsplash.com/photo-1583454110551-21f2fa2afe61"},
 {name:"Zancadas", img:"https://images.unsplash.com/photo-1594737625785-a6cbdabd333c"},
 {name:"Flexiones", img:"https://images.unsplash.com/photo-1598970434795-0c54fe7c0642"}
];

// ESTADO
let day = parseInt(localStorage.getItem("currentDay")) || 1;
let water = parseInt(localStorage.getItem("water")) || 0;

// UI
function loadDay(){
 document.getElementById("dayTitle").innerText = "Día " + day;

 let ex = exercises[(day-1)%exercises.length];

 document.getElementById("exerciseName").innerText = ex.name;
 document.getElementById("exerciseImg").src = ex.img;
}

// TIMER
let time = 30;
let interval;

function startTimer(){
 clearInterval(interval);
 interval = setInterval(()=>{
  time--;
  document.getElementById("timer").innerText = time;
  if(time<=0){
   clearInterval(interval);
   alert("Siguiente ronda");
   time=30;
  }
 },1000);
}

// COMPLETAR DÍA
function completeDay(){
 localStorage.setItem("day"+day,"done");
 day++;
 localStorage.setItem("currentDay",day);
 loadDay();
 renderTracker();
}

// FALLAR TODO
function failAll(){
 alert("Reinicio total");
 localStorage.clear();
 day=1;
 water=0;
 loadDay();
 renderTracker();
 renderWater();
}

// TRACKER DÍAS
function renderTracker(){
 const tracker = document.getElementById("tracker");
 tracker.innerHTML="";
 for(let i=1;i<=30;i++){
  let d=document.createElement("div");
  d.classList.add("day");
  d.innerText=i;

  if(localStorage.getItem("day"+i)) d.classList.add("done");

  tracker.appendChild(d);
 }
}

// AGUA
function renderWater(){
 const w=document.getElementById("waterTracker");
 w.innerHTML="";
 for(let i=0;i<8;i++){
  let g=document.createElement("div");
  g.classList.add("glass");
  if(i<water) g.classList.add("full");
  w.appendChild(g);
 }
}

function addWater(){
 if(water<8){
  water++;
  localStorage.setItem("water",water);
  renderWater();
 }
}

// INIT
loadDay();
renderTracker();
renderWater();

// ALARMA
setInterval(()=>{
 let now=new Date();
 if(now.getHours()==6 && now.getMinutes()==30){
  alert("ENTRENA AHORA");
 }
},60000);

</script>

</body>
</html>
